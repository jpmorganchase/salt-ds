name: "Test"
on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Verify lint policy
        run: yarn verify:lint

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Verify published artifacts
        run: yarn verify:artifacts
  type-checks:
    name: Type Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Verify types
        run: yarn verify:typecheck
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Verify units
        run: yarn verify:unit
  cypress-tests:
    name: Cypress Tests (React ${{ matrix.react }})
    strategy:
      fail-fast: false
      matrix:
        react: [16, 17, 18]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Setup react
        env:
          REACT_VERSION: ${{ matrix.react }}
        run: |
          yarn set resolution react@npm:^18.0.0 "npm:^$REACT_VERSION"
          yarn set resolution react-dom@npm:^18.0.0 "npm:^$REACT_VERSION"
      - name: Build packages
        run: yarn run build
      - name: Cypress Components
        uses: cypress-io/github-action@dace029018fcdf86e0df89a31bc3cfa5b32570d8 # v7
        with:
          install: false
          component: true
          browser: chrome
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.react }}
          path: cypress/screenshots
