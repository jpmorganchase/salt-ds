name: "Test"
on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn
      - name: Lint
        run: yarn biome ci --reporter=github
      - name: Prettier
        run: yarn run prettier:ci
      - name: Stylelint
        run: yarn run lint:style
      - name: Check no import from src
        run: |
          if find ./packages -type f \( -iname \*.ts -o -iname \*.tsx \) -exec grep "@salt-ds/.*/src" {} +; then
            echo "Should not import from src in any typescript file"
            exit 1;
          fi
      - name: Spellcheck
        run: yarn workspace @salt-ds/site spellcheck

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn
      - name: Build
        run: yarn build
      - name: Check build core package.json dependencies
        run: |
          if grep -q "@salt-ds\/\(core\|lab\)\":" dist/salt-ds-core/package.json; then
              echo "Core package can not reference itself or lab package"
              exit 1;
          fi
      - name: Check build icon package.json dependencies
        run: |
          if grep -q "@salt-ds\/\(icon\|core\|lab\)\":" dist/salt-ds-icon/package.json; then
              echo "Icon package can not reference itself or core or lab package"
              exit 1;
          fi
      - name: Check build lab package.json dependencies
        run: |
          if grep -q "@salt-ds\/lab\":" dist/salt-ds-lab/package.json; then
              echo "Lab package can not reference itself"
              exit 1;
          fi
  type-checks:
    name: Type Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn
      - name: Run typecheck
        run: yarn run typecheck
  jest-tests:
    name: Jest Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn
      - name: Generate site snapshot inputs
        run: yarn workspace @salt-ds/site gen:snapshot
      - run: yarn run test
  consumer-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn
      - name: Consumer smoke test
        run: yarn smoke:consumer
  cypress-tests:
    name: Cypress Tests (React ${{ matrix.react }})
    strategy:
      fail-fast: false
      matrix:
        react: [16, 17, 18]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "yarn"
      - name: Install dependencies
        run: yarn
      - name: Setup react
        env:
          REACT_VERSION: ${{ matrix.react }}
        run: |
          yarn set resolution react@npm:^18.0.0 "npm:^$REACT_VERSION"
          yarn set resolution react-dom@npm:^18.0.0 "npm:^$REACT_VERSION"
      - name: Build packages
        run: yarn run build
      - name: Cypress Components
        uses: cypress-io/github-action@dace029018fcdf86e0df89a31bc3cfa5b32570d8 # v7
        with:
          install: false
          component: true
          browser: chrome
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.react }}
          path: cypress/screenshots
