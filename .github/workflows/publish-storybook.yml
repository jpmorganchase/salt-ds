name: Storybook Preview Publish
run-name: Storybook publish for ${{ github.event.workflow_run.head_branch }}

on:
  workflow_run:
    workflows: ["Build Storybook"]
    types:
      - completed

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      deployments: write
      pull-requests: read
      statuses: write

    name: Deploy Storybook to Cloudflare Pages
    steps:
      - name: Set initial commit status
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: "pending",
              description: "Pending",
              context: "Storybook"
            })

      - name: Resolve workflow run context
        uses: actions/github-script@v9
        id: run_context
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function getPullRequest() {
              if (workflowRun.event !== "pull_request") {
                return undefined;
              }

              const workflowPullRequest = workflowRun.pull_requests?.[0];

              if (workflowPullRequest?.number) {
                const response = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: workflowPullRequest.number,
                });

                return response.data;
              }

              const associatedPullRequests = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: workflowRun.head_sha,
              });

              const pullRequest = associatedPullRequests.data.find(({ head }) => (
                head.sha === workflowRun.head_sha &&
                head.repo?.full_name === workflowRun.head_repository.full_name
              )) ?? associatedPullRequests.data[0];

              if (!pullRequest) {
                throw new Error(`Could not resolve a pull request for workflow run ${workflowRun.id}`);
              }

              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullRequest.number,
              });

              return response.data;
            }

            const pullRequest = await getPullRequest();
            const branchName = pullRequest ? pullRequest.head.label : workflowRun.head_branch;
            const deploymentBranch = pullRequest ? `pr-${pullRequest.number}` : workflowRun.head_branch;

            core.setOutput("branchName", branchName);
            core.setOutput("deploymentBranch", deploymentBranch);
            core.setOutput("headSha", workflowRun.head_sha);
            core.setOutput("issueNumber", pullRequest?.number ?? "");

            core.info(`Resolved ${workflowRun.event} workflow run for ${branchName} at ${workflowRun.head_sha}`);

      - name: "Download build artifact"
        uses: actions/download-artifact@v8
        with:
          name: storybook-build
          path: ${{ runner.temp }}/storybook-static
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: "Delete stats.json if it exists"
        run: rm -f "$STORYBOOK_STATIC_DIR/preview-stats.json"
        env:
          STORYBOOK_STATIC_DIR: ${{ runner.temp }}/storybook-static

      - name: Publish
        uses: cloudflare/wrangler-action@v3
        id: publish
        with:
          apiToken: ${{ secrets.CLOUDFLARE_SALT_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_SALT_ACCOUNT_ID }}
          command: pages deploy ${{ runner.temp }}/storybook-static --project-name=saltdesignsystem-storybook --branch=${{ steps.run_context.outputs.deploymentBranch }}

      - name: Update deploy status (success)
        uses: actions/github-script@v9
        if: success()
        env:
          STORYBOOK_URL: ${{ steps.publish.outputs.pages-deployment-alias-url }}
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: "success",
              description: "Successfully deployed",
              context: "Storybook",
              target_url: process.env.STORYBOOK_URL
            });

      - name: Update deploy status (failure)
        uses: actions/github-script@v9
        if: failure()
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const targetUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: "error",
              description: "Failed to deploy",
              context: "Storybook",
              target_url: targetUrl
            });
