interface:
  display_name: "Salt DS"
  short_description: "Salt design system workflow for review, upgrade, migrate, create, and bootstrap"
  default_prompt: "Use the Salt workflow only when the task needs Salt-specific guidance or explicit Salt adoption. Route the job to init, create, review, migrate, or upgrade. Start repo-aware work from project context through Salt MCP or salt-ds info --json before choosing Salt-specific structure. Ground the answer in canonical Salt guidance before applying repo conventions or runtime evidence. This skill is especially useful for dashboards, table-and-filters surfaces, form workflows, dialogs, navigation shells, and migration from non-Salt UI. If both .salt/team.json and .salt/stack.json are missing, keep the first result canonical-only and recommend the Salt bootstrap workflow through MCP or salt-ds init only when durable repo policy or the managed repo instruction block would materially improve future results. When create returns composition_contract.expected_patterns, composition_contract.expected_components, or an implementation_gate with follow-through required, run the targeted Salt create follow-up before implementing those regions. If create returns open_questions, ask the user before committing to the unresolved Salt choice. Do not use this skill for generic React/CSS work that does not require Salt."
