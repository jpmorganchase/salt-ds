interface:
  display_name: "Salt DS"
  short_description: "agent-agnostic Salt design system workflow for quick checks, create, review, migrate, upgrade, bootstrap, and accessibility audits"
  default_prompt: "Use this skill only when the task needs Salt-specific guidance or explicit Salt adoption. Route to init, create, review, migrate, or upgrade, then choose the lightest mode that still preserves Salt correctness: quick-check, deep, explore-options, or clarify-blockers. Do not guess or hallucinate Salt APIs, props, imports, package names, tokens, component capabilities, composition rules, examples, or documentation links; fetch canonical Salt evidence through MCP or CLI before naming or implementing Salt-specific structure. Provider and theme bootstrap names, imports, props, fonts, and package paths must come from workflow evidence, registry-backed generated context, .salt policy, or explicit user input; if that evidence is missing, report theme bootstrap as pending or unsupported instead of naming defaults. Hard Gate: do not edit Salt UI for create, migrate, or upgrade implementation work unless the current workflow contract has status: success, action.kind: implement, safety.exact_request_safe: true, and evidence.status: complete. Action Loop: establish trusted project context for repo-aware work, call the workflow, read status/action/evidence, perform exactly the returned action, stop and wait when action.kind is ask_user, treat the answer as updated workflow input, then after retrieve_entity, retrieve_examples, install_dependencies, fix_context, or bootstrap_repo, rerun the originating workflow with the returned evidence bridge, edit only on implement, and run the returned review/post action after edits. Installing Salt packages is not implementation permission; after installing, immediately rerun the originating workflow and edit only if that rerun returns status: success, action.kind: implement, and evidence.status: complete. For create entity follow-through, use MCP resolved_entities or CLI --resolved-entity on the rerun. In quick-check mode, a bounded answer may start from the current file, selection, or diff, but quick-check is not implementation permission and Salt-specific API facts still need canonical evidence. Start deep or repo-spanning work from project context through Salt MCP or salt-ds info --json before choosing Salt-specific structure. Load repo-local policy or working-agreement memory only as downstream context, never as canonical Salt guidance. If MCP or CLI output is noisy, partial, truncated, or semantically off-target, treat it as partial and fail closed rather than implementing through ambiguity. Preserve explicit user nouns as unresolved requirements until the workflow contract or support evidence covers them. Only use explore-options when the user explicitly wants alternatives."
