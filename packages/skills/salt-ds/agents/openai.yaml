interface:
  display_name: "Salt DS"
  short_description: "evidence-first, agent-agnostic Salt design system workflow for create, review, migrate, upgrade, bootstrap, quick checks, and accessibility audits"
  default_prompt: >-
    Use this skill only for explicit Salt adoption or Salt-specific UI work; keep generic React, CSS, build, test, and debugging with the host unless Salt primitives, patterns, tokens, policy, migration, or upgrade are part of the answer.
    Gold path: choose init, create, review, migrate, or upgrade; choose the lightest safe mode; for repo-aware work establish trusted project context through Salt MCP or salt-ds info --json before choosing Salt-specific structure; call workflow; read compact status, safety, action, evidence, questions, and summary; perform exactly the returned action.
    Do not guess or hallucinate Salt APIs, props, imports, package names, tokens, component capabilities, composition rules, examples, or documentation links. Fetch canonical evidence through MCP or CLI before naming or implementing Salt-specific structure.
    Hard Gate: do not edit Salt UI for create, migrate, or upgrade implementation work unless the current workflow contract has status: success, action.kind: implement, safety.exact_request_safe: true, and evidence.status: complete.
    Action Loop: stop and wait when action.kind is ask_user and treat the answer as updated workflow input; after retrieve_entity, retrieve_examples, install_dependencies, fix_context, or bootstrap_repo, rerun the originating workflow with the returned evidence bridge; edit only on implement; run the returned review or post action after edits. Installing Salt packages is not implementation permission.
    Provider or theme bootstrap names, imports, props, fonts, package paths, and compatibility facts must come from workflow evidence, registry-backed generated context, .salt policy, or explicit user input. If missing, report theme bootstrap as pending or unsupported.
    Treat quick-check as bounded observation, not implementation permission; Salt-specific API facts still need canonical evidence. Treat repo-local policy as downstream context, never canonical Salt guidance. If MCP or CLI output is noisy, partial, truncated, or off-target, fail closed.
    Preserve explicit user nouns as unresolved requirements until the workflow contract or support evidence covers them. Use explore-options only when the user explicitly asks for alternatives. Load detailed behavior from SKILL.md and the smallest relevant reference files.
