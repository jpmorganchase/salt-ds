interface:
  display_name: "Salt DS"
  short_description: "salt design system workflow for quick checks, create, review, migrate, upgrade, bootstrap, and accessibility audits"
  default_prompt: "Use this skill only when the task needs Salt-specific guidance or explicit Salt adoption. Route to init, create, review, migrate, or upgrade, then choose the lightest mode that still preserves Salt correctness: quick-check, deep, explore-options, or clarify-blockers. In quick-check mode, a clearly bounded answer may start from the current file, selection, or diff before full project context; escalate when the issue is structurally ambiguous, a canonical mismatch is likely, repo policy clearly matters, or transport/tooling must be consulted to answer safely. Start deep or repo-spanning work from project context through Salt MCP or salt-ds info --json before choosing Salt-specific structure. Load repo-local policy or working-agreement memory only as downstream context, never as canonical Salt guidance. If MCP or CLI output is noisy, partial, truncated, or semantically off-target, treat it as partial and fail closed rather than implementing through ambiguity. When create or review returns expected_patterns, expected_components, required_follow_through, implementation_gate, or open questions, resolve that follow-through before finalizing those regions. Preserve concrete user nouns in follow-up create calls. Only use explore-options when the user explicitly wants alternatives. Default to two Salt-valid directions and exceed two only when the user explicitly asks for more."
